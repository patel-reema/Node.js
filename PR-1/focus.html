<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: #03152d;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: #92b4e1;
            padding: 35px;
            width: 360px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 10px 15px 20px rgba(203, 210, 230, 0.326);
        }

        h1 {
            margin-bottom: 12px;
            color: #041335;
            font-weight: 900;
        }

        p {
            color: #233073;
            line-height: 1.3;
            letter-spacing: 1.2;
            font-size: 16px;
        }

        nav {
            margin-top: 18px;
        }

        nav a {
            margin: 0 8px;
            text-decoration: none;
            letter-spacing: 2px;
            font-size: 16px;
            color: #222;
            font-weight: 700;
        }

        nav a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>
    <div class="box">
        <nav>
            <a href="/">Home</a>
            <a href="/focus">Focus</a>
            <a href="/energy">Energy</a>
            <a href="/calm">Calm</a>
        </nav>
        <h1>Stay Focused</h1>

        <p>
            Focus is the key to success.
            Doing one thing at a time helps you achieve better results.
        </p>

        <p>
            Avoid distractions.
            Put your phone aside and give full attention to your work.
        </p>

        <p>
            Small progress every day leads to big success.
        </p>
    </div>
</body>

</html>
